<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farangis ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.card{
    background:white;
    padding:40px;
    border-radius:25px;
    text-align:center;
    width:90%;
    max-width:500px;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
}

h1{
    margin-bottom:20px;
}

p{
    margin-bottom:15px;
    line-height:1.6;
}

button{
    border:none;
    padding:14px 28px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    margin:10px;
}

#yesBtn{
    background:#4CAF50;
    color:white;
}

#noBtn{
    background:#ff4d4d;
    color:white;
    position:absolute;
}

.hidden{
    display:none;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:16px;
}

.heart{
    position:absolute;
    font-size:24px;
    animation:fall linear infinite;
    opacity:0.8;
    pointer-events:none;
}

@keyframes fall{
    from{
        transform:translateY(-100px);
    }
    to{
        transform:translateY(110vh);
    }
}
</style>
</head>
<body>

<div class="card" id="page1">
    <h1>Farangis ❤️</h1>

    <p>
        Men seni juda qadrlayman va sen bilan
        ajoyib vaqt o'tkazishni xohlayman.
    </p>

    <h2>Men bilan uchrashuvga chiqasanmi? 🥰</h2>

    <br>

    <button id="yesBtn">Ha ❤️</button>
    <button id="noBtn">Yo‘q 😅</button>
</div>

<div class="card hidden" id="page2">
    <h2>Uchrashuv sanasi va vaqtini tanla ❤️</h2>

    <input type="date" id="date">
    <input type="time" id="time">

    <button onclick="finish()">
        Tasdiqlash ❤️
    </button>
</div>

<div class="card hidden" id="page3">
    <h1>Rahmat, Farangis ❤️</h1>

    <p>
        Taklifimni qabul qilganing meni juda xursand qildi.
    </p>

    <p id="meetingInfo"></p>

    <br>

    <h3>
        Bu kunni sabrsizlik bilan kutaman ❤️
    </h3>
</div>

<script>

// Yurakchalar animatsiyasi
for(let i=0;i<30;i++){

    const heart=document.createElement("div");

    heart.className="heart";
    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=
        (5+Math.random()*8)+"s";

    document.body.appendChild(heart);
}

const noBtn=document.getElementById("noBtn");

function moveButton(){

    const maxX=window.innerWidth-120;
    const maxY=window.innerHeight-60;

    noBtn.style.left=
        Math.random()*maxX+"px";

    noBtn.style.top=
        Math.random()*maxY+"px";
}

noBtn.addEventListener("mouseenter",moveButton);

noBtn.addEventListener("touchstart",function(e){
    e.preventDefault();
    moveButton();
});

document.getElementById("yesBtn")
.addEventListener("click",function(){

    document.getElementById("page1")
    .classList.add("hidden");

    document.getElementById("page2")
    .classList.remove("hidden");
});

function finish(){

    const date=
    document.getElementById("date").value;

    const time=
    document.getElementById("time").value;

    document.getElementById("page2")
    .classList.add("hidden");

    document.getElementById("page3")
    .classList.remove("hidden");

    document.getElementById("meetingInfo")
    .innerHTML=
    `Uchrashuvimiz <b>${date}</b> kuni soat <b>${time}</b> da ❤️`;
}
</script>

</body>
</html>
