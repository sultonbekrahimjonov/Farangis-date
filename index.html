<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farangis ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    min-height:100vh;
    overflow:hidden;

    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#a18cd1);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* floating effects */
.heart,.dot{
    position:absolute;
    pointer-events:none;
    opacity:0.7;
    z-index:0;
}

.heart{
    font-size:20px;
    animation:fall 8s linear infinite;
}

.dot{
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    animation:fall 10s linear infinite;
}

@keyframes fall{
    from{transform:translateY(-100px);}
    to{transform:translateY(110vh);}
}

/* PROFILE IMAGE TOP LEFT */
.profile{
    position:fixed;
    top:15px;
    left:15px;
    width:70px;
    height:70px;
    border-radius:50%;
    overflow:hidden;
    border:3px solid white;
    box-shadow:0 0 15px rgba(255,255,255,0.7);
    animation:float 4s ease-in-out infinite;
    z-index:10;
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

/* CARD */
.card{
    position:relative;
    z-index:2;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:25px;
    text-align:center;
    width:90%;
    max-width:420px;
    color:white;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

.hidden{display:none;}

button{
    border:none;
    padding:12px 22px;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    margin:10px;
}

#yesBtn{
    background:#4CAF50;
    color:white;
}

#noBtn{
    background:#ff4d4d;
    color:white;
    position:absolute;
}

/* MUSIC BAR */
.music-bar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(0,0,0,0.75);
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 15px;
    z-index:999;
    backdrop-filter:blur(10px);
}

.music-bar button{
    background:#4CAF50;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- PROFILE IMAGE (background.jpg) -->
<div class="profile">
    <img src="background.jpg">
</div>

<!-- HEARTS SCRIPT -->
<script>
for(let i=0;i<25;i++){
    let el=document.createElement("div");
    el.className=Math.random()>0.5?"heart":"dot";
    el.innerHTML="❤️";
    el.style.left=Math.random()*100+"vw";
    el.style.animationDuration=(5+Math.random()*6)+"s";
    document.body.appendChild(el);
}
</script>

<!-- MAIN CARD -->
<div class="card" id="page1">
    <h1>Farangis ❤️</h1>
    <p>Seni juda qadrlayman...</p>
    <h3>Uchrashuvga chiqasanmi?</h3>

    <button id="yesBtn">Ha ❤️</button>
    <button id="noBtn">Yo‘q 😅</button>
</div>

<!-- MUSIC BAR -->
<div class="music-bar">
    <div>
        🎵 Farangis uchun<br>
        <small>Ijrochi: Sultonbek</small>
    </div>

    <button onclick="playMusic()">▶️ Play</button>

    <audio id="bgMusic">
        <source src="music.mp3" type="audio/mpeg">
    </audio>
</div>

<script>

// NO button runaway
const noBtn=document.getElementById("noBtn");

function move(){
    noBtn.style.left=Math.random()*window.innerWidth+"px";
    noBtn.style.top=Math.random()*window.innerHeight+"px";
}

noBtn.addEventListener("mouseenter",move);
noBtn.addEventListener("touchstart",function(e){
    e.preventDefault();
    move();
});

// YES
document.getElementById("yesBtn").onclick=()=>{
    alert("❤️ Rahmat Farangis!");
};

// MUSIC FIX
function playMusic(){
    const music=document.getElementById("bgMusic");
    music.play().catch(()=>alert("Yana bir marta bosing ❤️"));
}

</script>

</body>
</html>
