<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farangis ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    min-height:100vh;

    background-image:url("background.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:0;
}

.card{
    position:relative;
    z-index:2;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);
    padding:35px;
    border-radius:25px;
    text-align:center;
    width:90%;
    max-width:450px;
    box-shadow:0 15px 40px rgba(0,0,0,.3);
    color:white;
}

h1{ margin-bottom:15px; }
p{ margin-bottom:15px; line-height:1.6; }

button{
    border:none;
    padding:14px 24px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    margin:10px;
}

#yesBtn{ background:#4CAF50; color:white; }
#noBtn{ background:#ff4d4d; color:white; position:absolute; }

.hidden{ display:none; }

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    font-size:16px;
}

/* hearts */
.heart{
    position:absolute;
    font-size:22px;
    animation:fall linear infinite;
    opacity:0.8;
    pointer-events:none;
}

@keyframes fall{
    from{transform:translateY(-100px);}
    to{transform:translateY(110vh);}
}

/* music bar */
.music-bar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(0,0,0,0.75);
    backdrop-filter:blur(10px);
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 15px;
    z-index:999;
}

.music-bar button{
    background:#4CAF50;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- MUSIC -->
<div class="music-bar">
    <div>
        🎵 <b>Farangis uchun</b><br>
        <small>Ijrochi: Sultonbek</small>
    </div>

    <button onclick="playMusic()">▶️ Play</button>

    <audio id="bgMusic">
        <source src="music.mp3" type="audio/mpeg">
    </audio>
</div>

<!-- PAGE 1 -->
<div class="card" id="page1">
    <h1>Farangis ❤️</h1>
    <p>Seni juda qadrlayman va uchrashmoqchiman 🥰</p>

    <h2>Uchrashuvga chiqasanmi?</h2>

    <button id="yesBtn">Ha ❤️</button>
    <button id="noBtn">Yo‘q 😅</button>
</div>

<!-- PAGE 2 -->
<div class="card hidden" id="page2">
    <h2>Uchrashuvni tanla ❤️</h2>

    <input type="date" id="date">
    <input type="time" id="time">

    <button onclick="finish()">Tasdiqlash ❤️</button>
</div>

<!-- PAGE 3 -->
<div class="card hidden" id="page3">
    <h1>Rahmat ❤️</h1>
    <p id="meetingInfo"></p>
</div>

<script>

// hearts
for(let i=0;i<25;i++){
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(5+Math.random()*6)+"s";
    document.body.appendChild(heart);
}

// NO button move
const noBtn=document.getElementById("noBtn");

function moveBtn(){
    noBtn.style.left=Math.random()*window.innerWidth+"px";
    noBtn.style.top=Math.random()*window.innerHeight+"px";
}

noBtn.addEventListener("mouseenter",moveBtn);
noBtn.addEventListener("touchstart",function(e){
    e.preventDefault();
    moveBtn();
});

// YES
document.getElementById("yesBtn").addEventListener("click",function(){
    document.getElementById("page1").classList.add("hidden");
    document.getElementById("page2").classList.remove("hidden");
});

// finish
function finish(){
    const d=document.getElementById("date").value;
    const t=document.getElementById("time").value;

    document.getElementById("page2").classList.add("hidden");
    document.getElementById("page3").classList.remove("hidden");

    document.getElementById("meetingInfo").innerHTML=
    `Uchrashuv: <b>${d}</b> soat <b>${t}</b> ❤️`;
}

// MUSIC FIX (ENG MUHIM)
function playMusic(){
    const music=document.getElementById("bgMusic");

    music.play().catch(()=>{
        alert("Musicni yoqish uchun yana 1 marta bosing ❤️");
    });
}

</script>

</body>
</html>
