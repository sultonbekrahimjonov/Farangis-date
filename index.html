<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farangis ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;

    background-image: url("background.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* overlay */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    z-index:0;
}

.card{
    position:relative;
    z-index:1;
    background:rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding:35px;
    border-radius:25px;
    text-align:center;
    width:90%;
    max-width:450px;
    box-shadow:0 15px 40px rgba(0,0,0,.3);
    color:white;
}

h1{
    margin-bottom:20px;
}

p{
    margin-bottom:15px;
    line-height:1.6;
}

button{
    border:none;
    padding:14px 26px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    margin:10px;
}

#yesBtn{
    background:#4CAF50;
    color:white;
}

#noBtn{
    background:#ff4d4d;
    color:white;
    position:absolute;
}

.hidden{
    display:none;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    font-size:16px;
}

/* hearts */
.heart{
    position:absolute;
    font-size:22px;
    animation:fall linear infinite;
    opacity:0.8;
    pointer-events:none;
    z-index:0;
}

@keyframes fall{
    from{ transform:translateY(-100px); }
    to{ transform:translateY(110vh); }
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="card" id="page1">
    <h1>Farangis ❤️</h1>

    <p>
        Men seni juda qadrlayman va sen bilan
        ajoyib vaqt o'tkazishni xohlayman.
    </p>

    <h2>Men bilan uchrashuvga chiqasanmi? 🥰</h2>

    <button id="yesBtn">Ha ❤️</button>
    <button id="noBtn">Yo‘q 😅</button>
</div>

<div class="card hidden" id="page2">
    <h2>Uchrashuvni tanla ❤️</h2>

    <input type="date" id="date">
    <input type="time" id="time">

    <button onclick="finish()">Tasdiqlash ❤️</button>
</div>

<div class="card hidden" id="page3">
    <h1>Rahmat ❤️</h1>

    <p>Seni kutaman Farangis 🥰</p>

    <p id="meetingInfo"></p>
</div>

<script>

// hearts animation
for(let i=0;i<25;i++){
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(5+Math.random()*6)+"s";
    document.body.appendChild(heart);
}

// NO button escape
const noBtn=document.getElementById("noBtn");

function moveButton(){
    const maxX=window.innerWidth-120;
    const maxY=window.innerHeight-60;

    noBtn.style.left=Math.random()*maxX+"px";
    noBtn.style.top=Math.random()*maxY+"px";
}

noBtn.addEventListener("mouseenter",moveButton);
noBtn.addEventListener("touchstart",function(e){
    e.preventDefault();
    moveButton();
});

// YES button
document.getElementById("yesBtn").addEventListener("click",function(){
    document.getElementById("page1").classList.add("hidden");
    document.getElementById("page2").classList.remove("hidden");
});

// finish
function finish(){
    const date=document.getElementById("date").value;
    const time=document.getElementById("time").value;

    document.getElementById("page2").classList.add("hidden");
    document.getElementById("page3").classList.remove("hidden");

    document.getElementById("meetingInfo").innerHTML=
    `Uchrashuv: <b>${date}</b> soat <b>${time}</b> ❤️`;
}

</script>

</body>
</html>
